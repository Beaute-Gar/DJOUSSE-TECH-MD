<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJOUSSE-TECH-MD</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#050a12;color:#e2f0ff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .card{background:#0f1a2e;border:1px solid #1a2e44;border-radius:16px;padding:28px;width:100%;max-width:400px;text-align:center}
  .logo h1{font-size:20px;font-weight:700;letter-spacing:3px;background:linear-gradient(90deg,#00c8ff,#00ffe7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
  .logo p{color:#6b8aad;font-size:11px;margin-bottom:24px}
  .status{font-size:13px;color:#6b8aad;margin-bottom:20px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#6b8aad;margin-right:6px;vertical-align:middle}
  .dot.green{background:#39ff98;box-shadow:0 0 12px #39ff98}
  input{width:100%;background:#0c1524;border:1px solid #1a2e44;border-radius:8px;padding:12px;color:#e2f0ff;font-size:15px;outline:none;margin-bottom:12px;text-align:center}
  input:focus{border-color:#00c8ff}
  .btn{width:100%;background:linear-gradient(135deg,#00c8ff,#00ffe7);border:none;border-radius:8px;padding:14px;font-size:14px;font-weight:700;color:#050a12;cursor:pointer}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .code-box{display:none;background:#0c1524;border:1px solid #00c8ff;border-radius:10px;padding:20px;margin-top:16px;text-align:center}
  .code-box.show{display:block}
  .code-value{font-family:monospace;font-size:32px;font-weight:700;letter-spacing:8px;color:#00c8ff}
  .countdown{font-size:12px;color:#39ff98;margin-top:8px}
  .error{display:none;background:#ff445510;border:1px solid #ff4455;border-radius:8px;padding:10px;font-size:12px;color:#ff4455;margin-top:12px}
  .error.show{display:block}
  .hidden{display:none}
  .footer{font-size:10px;color:#6b8aad44;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>DJOUSSE-TECH-MD</h1>
    <p>DJoussetech Evolution</p>
  </div>

  <!-- Écran token -->
  <div id="screen-token">
    <div class="status">Entrez le token de securite</div>
    <input type="password" id="token-input" placeholder="Token de securite">
    <button class="btn" id="token-btn" onclick="authToken()">Valider</button>
    <div class="error" id="token-error"></div>
  </div>

  <!-- Écran pairage -->
  <div id="screen-pair" class="hidden">
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="status-text">Initialisation...</span>
    </div>
    <input type="tel" id="phone" placeholder="237659809751">
    <button class="btn" id="pair-btn" onclick="requestCode()">Generer le code</button>
    <div class="code-box" id="code-box">
      <div class="code-value" id="code-val">---- ----</div>
      <div class="countdown" id="countdown"></div>
    </div>
    <div class="error" id="error"></div>
    <div class="footer">WhatsApp &rarr; Parametres &rarr; Appareils lies &rarr; Lier un appareil</div>
  </div>
</div>

<script>
let timer=null;
const TOKEN_KEY='djousse_token';

async function authToken(){
  const t=document.getElementById('token-input').value.trim();
  const btn=document.getElementById('token-btn');
  const err=document.getElementById('token-error');
  err.classList.remove('show');
  if(!t){err.textContent='Entrez le token';err.classList.add('show');return}
  btn.disabled=true;btn.textContent='Verification...';
  try{
    const r=await fetch('/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})});
    const d=await r.json();
    if(d.success){
      localStorage.setItem(TOKEN_KEY,t);
      document.getElementById('screen-token').classList.add('hidden');
      document.getElementById('screen-pair').classList.remove('hidden');
      checkStatus();
    }else{err.textContent='Token invalide';err.classList.add('show');btn.disabled=false;btn.textContent='Valider'}
  }catch{err.textContent='Erreur reseau';err.classList.add('show');btn.disabled=false;btn.textContent='Valider'}
}

async function requestCode(){
  const phone=document.getElementById('phone').value.replace(/[^0-9]/g,'');
  const btn=document.getElementById('pair-btn'),codeBox=document.getElementById('code-box'),error=document.getElementById('error');
  codeBox.classList.remove('show');error.classList.remove('show');
  if(!phone||phone.length<7){showError('Numero invalide');return}
  btn.disabled=true;btn.textContent='Generation...';
  const token=localStorage.getItem(TOKEN_KEY);
  try{
    const r=await fetch('/pair',{method:'POST',headers:{'Content-Type':'application/json','X-Pairing-Token':token||''},body:JSON.stringify({number:phone})});
    const d=await r.json();
    if(d.success){
      document.getElementById('code-val').textContent=d.code;
      codeBox.classList.add('show');btn.textContent='Nouveau code';btn.disabled=false;startCountdown(120);
    }else if(d.connected){document.getElementById('status-text').textContent='Connecte';document.getElementById('dot').className='dot green'}
    else{showError(d.message||'Erreur');btn.textContent='Reessayer';btn.disabled=false}
  }catch{showError('Erreur reseau');btn.textContent='Reessayer';btn.disabled=false}
}

async function checkStatus(){
  try{
    const r=await fetch('/status');const d=await r.json();
    if(d.connected){document.getElementById('dot').className='dot green';document.getElementById('status-text').textContent='Connecte'}
    else{document.getElementById('dot').className='dot';document.getElementById('status-text').textContent='Prete'}
  }catch{document.getElementById('status-text').textContent='Hors ligne'}
}

function startCountdown(s){if(timer)clearInterval(timer);const el=document.getElementById('countdown');let r=s;el.textContent=r+'s';timer=setInterval(()=>{r--;if(r<=0){clearInterval(timer);el.textContent='Expire'}else el.textContent=r+'s'},1000)}
function showError(m){const el=document.getElementById('error');el.textContent=m;el.classList.add('show')}

document.addEventListener('DOMContentLoaded',async()=>{
  const r=await fetch('/status');const d=await r.json();
  if(d.connected){document.getElementById('screen-token').classList.add('hidden');document.getElementById('screen-pair').classList.remove('hidden');document.getElementById('dot').className='dot green';document.getElementById('status-text').textContent='Connecte';return}
  if(!d.hasToken){document.getElementById('screen-token').classList.add('hidden');document.getElementById('screen-pair').classList.remove('hidden');setInterval(checkStatus,5000);return}
  const saved=localStorage.getItem(TOKEN_KEY);
  if(saved){
    const r2=await fetch('/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:saved})});
    const d2=await r2.json();
    if(d2.success){document.getElementById('screen-token').classList.add('hidden');document.getElementById('screen-pair').classList.remove('hidden');setInterval(checkStatus,5000);return}
  }
  document.getElementById('phone').addEventListener('keydown',e=>{if(e.key==='Enter')requestCode()});
});
</script>
</body>
</html>
